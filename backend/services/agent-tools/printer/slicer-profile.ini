# PrusaSlicer profile for CoreXY printer (MKS Pi / Klipper)
# Bed: 246x258mm, Z: 248mm, Nozzle: 0.4mm, Filament: 1.75mm

[print:Default]
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 4
fill_density = 15%
fill_pattern = gyroid
support_material = 0
support_material_auto = 1
brim_width = 0
skirts = 1
skirt_distance = 5

[filament:PLA]
filament_diameter = 1.75
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 65
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100

[filament:ABS]
filament_diameter = 1.75
temperature = 245
first_layer_temperature = 250
bed_temperature = 100
first_layer_bed_temperature = 105
fan_always_on = 0
min_fan_speed = 0
max_fan_speed = 30

[filament:PETG]
filament_diameter = 1.75
temperature = 235
first_layer_temperature = 240
bed_temperature = 80
first_layer_bed_temperature = 85
fan_always_on = 1
min_fan_speed = 50
max_fan_speed = 80

[printer:CoreXY]
bed_shape = 0x0,246x0,246x258,0x258
max_print_height = 248
nozzle_diameter = 0.4
retract_length = 0.8
retract_speed = 40
retract_lift = 0.2
use_relative_e_distances = 1
gcode_flavor = klipper
start_gcode = PRINT_START EXTRUDER={first_layer_temperature[0]} BED={first_layer_bed_temperature[0]}
end_gcode = PRINT_END
