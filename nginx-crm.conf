server {
    listen 80;
    server_name crm.hltrn.cc;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name crm.hltrn.cc;
    
    # Max upload size 50MB
    client_max_body_size 50M;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/crm.hltrn.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.hltrn.cc/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Root directory for frontend build
    root /var/www/business-crm/dist;
    index index.html;
    
    # Uploaded files - serve from /var/lib/business-crm-data/uploads
    location /uploads {
        alias /var/lib/business-crm-data/uploads;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
        
        # Security: disable execution of scripts
        location ~* \.(php|pl|py|sh|cgi)$ {
            deny all;
        }
    }
    
    # Google OAuth callback - proxy to backend (prefix match with priority)
    location ^~ /auth/google/callback {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Frontend - serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Backend API proxy
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Logs
    access_log /var/log/nginx/crm.hltrn.cc.access.log;
    error_log /var/log/nginx/crm.hltrn.cc.error.log;
}
